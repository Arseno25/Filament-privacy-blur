name: "Run Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # PHP 8.2 - Filament 4.x only (v5 requires PHP 8.3+)
          - os: ubuntu-latest
            php: '8.2'
            laravel: 11.*
            testbench: 9.*
            filament: 4.*
          - os: ubuntu-latest
            php: '8.2'
            laravel: 12.*
            testbench: 10.*
            filament: 4.*

          # PHP 8.3+ - Both Filament 4.x and 5.x
          - os: ubuntu-latest
            php: '8.4'
            laravel: 11.*
            testbench: 9.*
            filament: 4.*
          - os: ubuntu-latest
            php: '8.4'
            laravel: 11.*
            testbench: 9.*
            filament: 5.*
          - os: ubuntu-latest
            php: '8.4'
            laravel: 12.*
            testbench: 10.*
            filament: 4.*
          - os: ubuntu-latest
            php: '8.4'
            laravel: 12.*
            testbench: 10.*
            filament: 5.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - F${{ matrix.filament }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "filament/filament:${{ matrix.filament }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-scripts --no-audit

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci
